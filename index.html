        if(kind==="professor")return '<section class="dash-grid"><article class="panel"><h3>Turmas de hoje</h3><div class="table-wrap"><table class="table"><thead><tr><th>Turma</th><th>Horário</th><th>Alunos</th><th>Status</th></tr></thead><tbody><tr><td>TOS-2026.2</td><td>09:00</td><td>24</td><td><span class="badge">Confirmada</span></td></tr><tr><td>MIX-07</td><td>14:00</td><td>18</td><td><span class="badge">Confirmada</span></td></tr><tr><td>ALI-04</td><td>19:00</td><td>20</td><td><span class="badge warn">Preparar</span></td></tr></tbody></table></div></article><article class="panel"><h3>Pendências</h3><div class="timeline"><div class="event"><time>12</time><div><b>Atividades para corrigir</b><span>Mixagem na Prática</span></div></div><div class="event"><time>02</time><div><b>Planos de aula</b><span>Prazo nesta semana</span></div></div><div class="event"><time>01</time><div><b>Diário incompleto</b><span>Turma TOS-2026.2</span></div></div></div></article></section>';
        return '<section class="dash-grid"><article class="panel"><h3>Matrículas por mês</h3><div class="bars"><div class="bar" style="height:42%"><span>Fev</span></div><div class="bar" style="height:58%"><span>Mar</span></div><div class="bar" style="height:49%"><span>Abr</span></div><div class="bar" style="height:76%"><span>Mai</span></div><div class="bar" style="height:68%"><span>Jun</span></div><div class="bar" style="height:91%"><span>Jul</span></div></div></article><article class="panel"><h3>Atividade recente</h3><div class="timeline"><div class="event"><time>+8</time><div><b>Novas matrículas</b><span>Últimas 24 horas</span></div></div><div class="event"><time>12</time><div><b>Certificados emitidos</b><span>Nesta semana</span></div></div><div class="event"><time>03</time><div><b>Turmas próximas</b><span>Início em agosto</span></div></div></div></article></section>'
      }
      window.logout=function(){localStorage.removeItem("centepSession");go("home")}
      function loadImageAsset(file,parts,callback){
        var requests=[];
        for(var index=1;index<=parts;index++){
          requests.push(fetch(file+".part"+index).then(function(response){
            if(!response.ok)throw new Error("asset");
            return response.text();
          }));
        }
        Promise.all(requests).then(function(chunks){
          callback('url("data:image/jpeg;base64,'+chunks.join("").trim()+'")');
        }).catch(function(){});
      }
      function loadCourseVisuals(){
        var courseImages=[["course-tecnico-operador.b64",4],["course-alinhamento.b64",4],["course-mixagem.b64",4],["course-dinamicos.b64",4]];
        document.querySelectorAll(".course-art").forEach(function(card,index){
          var requested=card.getAttribute("data-course-image"),imageIndex=requested===null?index:Number(requested),asset=courseImages[imageIndex];
          if(!asset)return;
          loadImageAsset(asset[0],asset[1],function(image){
            card.style.backgroundImage="linear-gradient(0deg,rgba(3,12,23,.58),rgba(3,12,23,.04) 68%),"+image;
            card.style.backgroundSize="cover";
            card.style.backgroundPosition="center";
          });
        });
      }
      function loadVisuals(){
        loadImageAsset("hero-audio-v3-web.b64",6,function(image){
          var hero=document.querySelector(".hero");
          if(hero){
            hero.style.backgroundImage="radial-gradient(circle at 80% 22%,rgba(20,128,220,.16),transparent 26%),"+image;
            hero.style.backgroundSize="cover";
            hero.style.backgroundPosition="center center";
          }
        });
        loadCourseVisuals();
      }
      function loadBrandAsset(){
        fetch("logo-centep-oficial.b64").then(function(response){
          if(!response.ok)throw new Error("asset");
          return response.text();
        }).then(function(base64){
          document.querySelectorAll("[data-centep-logo]").forEach(function(img){
            img.src="data:image/jpeg;base64,"+base64.trim();
            img.classList.add("ready");
            var link=img.closest(".brand");
            if(link)link.classList.add("logo-ready");
          });
        }).catch(function(){});
      }
      function bindLogin(){
        var roleButtons=document.querySelectorAll("[data-role]");
        roleButtons.forEach(function(btn){btn.addEventListener("click",function(){selectedRole=btn.getAttribute("data-role");render()})});
        var role=roles[selectedRole],email=document.getElementById("email"),password=document.getElementById("password");
        email.value=role.email;password.value=role.senha;
        document.getElementById("demo-note").innerHTML="<b>Acesso demonstrativo:</b><br>"+role.email+" • "+role.senha;
        document.getElementById("login-form").addEventListener("submit",function(event){event.preventDefault();var valid=email.value.trim().toLowerCase()===role.email.toLowerCase()&&password.value===role.senha;if(!valid){document.getElementById("login-error").textContent="E-mail ou senha inválidos para o perfil selecionado.";return}localStorage.setItem("centepSession",JSON.stringify({role:selectedRole,email:role.email}));go(role.route)})
      }
      function render(){
        var current=route();
        if(current==="home-cursos"||current==="home-lab"||current==="home-sobre"){app.innerHTML=home();loadVisuals();loadBrandAsset();setTimeout(function(){var el=document.getElementById(current);if(el)el.scrollIntoView()},0);return}
        if(current==="login"){app.innerHTML=login();loadBrandAsset();bindLogin();return}
        if(current==="portal-aluno"){app.innerHTML=shell("aluno");loadBrandAsset();loadCourseVisuals();return}
        if(current==="portal-professor"){app.innerHTML=shell("professor");loadBrandAsset();loadCourseVisuals();return}
        if(current==="admin"){app.innerHTML=shell("admin");loadBrandAsset();loadCourseVisuals();return}
        app.innerHTML=home();loadVisuals();loadBrandAsset()
      }
      window.addEventListener("hashchange",render);render();
    })();
  </script>
