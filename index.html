<body>
  <div id="app"></div>
  <script>
    (function(){

      };
      var selectedRole="aluno";
      function route(){return (location.hash.replace(/^#\/?/,"")||"home").split("?")[0]}
      function go(path){location.hash="#/"+path}
      window.go=go;
      function brand(){return '<a class="brand" href="#/home"><span class="official-logo-shell"><img class="official-logo" data-centep-logo alt="CENTEP — Centro de Ensino Técnico Profissional"></span><span class="brand-fallback"><span class="brand-mark"><i></i><i></i><i></i><i></i><i></i></span><span class="brand-name">CENTEP<small>EDUCACIONAL 360</small></span></span></a>'}
      function header(){return '<header class="site-header"><div class="container nav" id="nav">'+brand()+'<nav class="nav-links"><a href="#/home">Início</a><a href="#/home-cursos">Cursos</a><a href="#/home-lab">CENTEP LAB</a><a href="#/home-sobre">Sobre</a></nav><div class="nav-actions"><a class="btn btn-ghost" href="#/login">Portal</a><a class="btn btn-gold" href="#/login">Matricule-se</a></div><button class="menu-toggle" aria-label="Abrir menu" onclick="document.getElementById(\'nav\').classList.toggle(\'open\')">☰</button></div></header>'}
      function home(){
        return header()+'<main><section class="hero"><div class="container hero-inner"><div><span class="eyebrow">Centro de Ensino Técnico Profissional</span><h1>Formando profissionais de <em>excelência.</em></h1><p>Aprenda áudio profissional com quem vive o mercado. Formação técnica, prática intensiva, laboratório especializado e conexão com oportunidades reais.</p><div class="hero-cta"><a class="btn btn-gold" href="#/login">Faça sua matrícula</a><a class="btn btn-ghost" href="#/home-cursos">Conheça os cursos</a></div></div><div class="sound-stage"><div class="stage-label"><span>CENTEP LAB</span><strong>Áudio em ação.</strong></div><div class="mixer">'+Array(8).fill('<div class="channel"></div>').join("")+'</div></div></div></section><div class="stats"><div class="container stats-grid"><div class="stat"><strong>+2.500</strong><span>Alunos formados</span></div><div class="stat"><strong>4</strong><span>Cursos especializados</span></div><div class="stat"><strong>+50</strong><span>Empresas parceiras</span></div><div class="stat"><strong>95%</strong><span>Satisfação dos alunos</span></div></div></div>'+
        '<section class="section courses" id="home-cursos"><div class="container"><div class="section-head"><div><span class="eyebrow">Formação especializada</span><h2>Cursos que transformam<br>paixão em profissão.</h2></div><p>Conteúdo atualizado, professores atuantes e atividades práticas que reproduzem os desafios do mercado de áudio profissional.</p></div><div class="course-grid">'+
        course("🎛","Formação profissional","Técnico e Operador de Som","Da montagem à operação de eventos, shows, igrejas e produções audiovisuais.")+
        course("🔊","Especialização","Alinhamento de Sistemas Sonoros","Configuração, medição e otimização de sistemas profissionais de áudio.")+
        course("🎚","Prática profissional","Mixagem na Prática","Técnicas de ganho, equalização, dinâmica e efeitos em situações reais.")+
        course("◉","Especialização avançada","Dinâmicos","Domine compressores, gates, limiters, sidechain e processamento multibanda.")+
        '</div></div></section>'+
        '<section class="section" id="home-lab"><div class="container features"><div class="feature-panel"><span class="eyebrow">CENTEP LAB</span><h3>Uma central técnica para evoluir sempre.</h3><p>Biblioteca exclusiva para alunos com materiais, videoaulas, presets, diagramas, riders, simulados e estudos de caso.</p><a class="btn btn-gold" href="#/login">Acessar o laboratório</a></div><div class="feature-list">'+feature("01","Biblioteca técnica","Guias, manuais e materiais organizados por nível.")+feature("02","Presets e cenas","Arquivos para mesas e processadores profissionais.")+feature("03","Videoaulas","Conteúdo complementar para aprender no seu ritmo.")+feature("04","Simulados","Avaliações e relatórios para acompanhar sua evolução.")+'</div></div></section>'+
        '<section class="section" id="home-sobre"><div class="container"><div class="cta"><div><h2>Transforme sua carreira com o CENTEP.</h2><p>Formação prática, tecnologia e compromisso com o mercado de trabalho.</p></div><a class="btn btn-gold" href="#/login">Comece agora</a></div></div></section></main>'+

      function feature(number,title,text){return '<article class="feature"><span class="feature-icon">'+number+'</span><b>'+title+'</b><p>'+text+'</p></article>'}
      function login(){
        return '<main class="login-page"><section class="login-brand"><div>'+brand()+'</div><div><span class="eyebrow">CENTEP Connect</span><h1>Conhecimento, prática e futuro em um só lugar.</h1><p>Acesse cursos, materiais, agenda, desempenho acadêmico e toda a experiência digital do CENTEP.</p></div><small>Ambiente demonstrativo • CENTEP 360</small></section><section class="login-form-wrap"><div class="login-card"><h2>Bem-vindo!</h2><p>Escolha o seu perfil para acessar a plataforma.</p><div class="role-switch" id="roles">'+Object.keys(roles).map(function(key){return '<button class="role-button '+(key===selectedRole?'active':'')+'" data-role="'+key+'">'+roles[key].label+'</button>'}).join("")+'</div><form id="login-form"><div class="field"><label for="email">E-mail</label><input id="email" type="email" autocomplete="username" required></div><div class="field"><label for="password">Senha</label><input id="password" type="password" autocomplete="current-password" required></div><div class="login-error" id="login-error"></div><button class="btn btn-primary" type="submit">Entrar no portal</button></form><div class="demo-note" id="demo-note"></div><a class="back-home" href="#/home">← Voltar ao site</a></div></section></main>'
      }
      function sidebar(active){
        var items=[["dashboard","▦","Visão geral"],["cursos","▤","Cursos"],["agenda","◷","Agenda"],["biblioteca","▥","Biblioteca"],["certificados","◇","Certificados"]];
        return '<aside class="sidebar">'+brand()+'<nav class="side-nav">'+items.map(function(item){return '<button class="'+(item[0]===active?'active':'')+'"><b>'+item[1]+'</b><span>'+item[2]+'</span></button>'}).join("")+'</nav><div class="side-foot"><button class="logout" onclick="logout()">↪ <span>Sair</span></button></div></aside>'
      }
      function kpi(icon,value,label){return '<article class="kpi"><div class="kpi-top"><span class="kpi-icon">'+icon+'</span><span class="badge">Atualizado</span></div><strong>'+value+'</strong><span>'+label+'</span></article>'}
      function shell(kind){
        var session=JSON.parse(localStorage.getItem("centepSession")||"null");
        if(!session||session.role!==kind){setTimeout(function(){go("login")},0);return '<div class="login-form-wrap">Redirecionando...</div>'}
        var data={
          aluno:{title:"Olá, Geraldo!",sub:"Continue avançando na sua jornada profissional.",name:"Geraldo",kpis:[["▤","2","Cursos ativos"],["◷","92%","Frequência"],["✓","8,7","Média geral"],["◇","3","Certificados"]]},
          professor:{title:"Painel do Professor",sub:"Acompanhe turmas, aulas e atividades pendentes.",name:"Professor",kpis:[["▤","4","Turmas ativas"],["♙","86","Alunos"],["◷","3","Aulas hoje"],["✓","12","Avaliações"]]},
          admin:{title:"Dashboard Executivo",sub:"Visão geral acadêmica e institucional do CENTEP.",name:"Administração",kpis:[["♙","248","Alunos ativos"],["▤","4","Cursos"],["↗","37","Novas matrículas"],["◇","186","Certificados"]]}
        }[kind];
        return '<div class="dashboard">'+sidebar("dashboard")+'<main class="dash-main"><header class="topbar"><div><h1>'+data.title+'</h1><p>'+data.sub+'</p></div><div class="user-pill"><span class="avatar">'+data.name.charAt(0)+'</span><div><b>'+data.name+'</b><br><small>'+roles[kind].label+'</small></div></div></header><section class="kpi-grid">'+data.kpis.map(function(x){return kpi(x[0],x[1],x[2])}).join("")+'</section>'+dashboardBody(kind)+'</main></div>'
      }
      function dashboardBody(kind){
        if(kind==="aluno")return '<section class="dash-grid"><article class="panel"><h3>Progresso dos cursos</h3><div class="course-progress"><div><header><span>Técnico e Operador de Som</span><span>72%</span></header><div class="progress"><i style="width:72%"></i></div></div><div><header><span>Mixagem na Prática</span><span>46%</span></header><div class="progress"><i style="width:46%"></i></div></div></div></article><article class="panel"><h3>Próximas atividades</h3><div class="timeline"><div class="event"><time>22<br>JUL</time><div><b>Mixagem de banda</b><span>Aula prática • 19h</span></div></div><div class="event"><time>25<br>JUL</time><div><b>Avaliação de dinâmica</b><span>Simulado online</span></div></div><div class="event"><time>29<br>JUL</time><div><b>Alinhamento de P.A.</b><span>Laboratório • 14h</span></div></div></div></article></section>';
        if(kind==="professor")return '<section class="dash-grid"><article class="panel"><h3>Turmas de hoje</h3><div class="table-wrap"><table class="table"><thead><tr><th>Turma</th><th>Horário</th><th>Alunos</th><th>Status</th></tr></thead><tbody><tr><td>TOS-2026.2</td><td>09:00</td><td>24</td><td><span class="badge">Confirmada</span></td></tr><tr><td>MIX-07</td><td>14:00</td><td>18</td><td><span class="badge">Confirmada</span></td></tr><tr><td>ALI-04</td><td>19:00</td><td>20</td><td><span class="badge warn">Preparar</span></td></tr></tbody></table></div></article><article class="panel"><h3>Pendências</h3><div class="timeline"><div class="event"><time>12</time><div><b>Atividades para corrigir</b><span>Mixagem na Prática</span></div></div><div class="event"><time>02</time><div><b>Planos de aula</b><span>Prazo nesta semana</span></div></div><div class="event"><time>01</time><div><b>Diário incompleto</b><span>Turma TOS-2026.2</span></div></div></div></article></section>';
        return '<section class="dash-grid"><article class="panel"><h3>Matrículas por mês</h3><div class="bars"><div class="bar" style="height:42%"><span>Fev</span></div><div class="bar" style="height:58%"><span>Mar</span></div><div class="bar" style="height:49%"><span>Abr</span></div><div class="bar" style="height:76%"><span>Mai</span></div><div class="bar" style="height:68%"><span>Jun</span></div><div class="bar" style="height:91%"><span>Jul</span></div></div></article><article class="panel"><h3>Atividade recente</h3><div class="timeline"><div class="event"><time>+8</time><div><b>Novas matrículas</b><span>Últimas 24 horas</span></div></div><div class="event"><time>12</time><div><b>Certificados emitidos</b><span>Nesta semana</span></div></div><div class="event"><time>03</time><div><b>Turmas próximas</b><span>Início em agosto</span></div></div></div></article></section>'
      }
      window.logout=function(){localStorage.removeItem("centepSession");go("home")}
      function loadImageAsset(file,callback){
        fetch(file).then(function(response){
          if(!response.ok)throw new Error("asset");
          return response.text();
        }).then(function(base64){callback('url("data:image/jpeg;base64,'+base64.trim()+'")')}).catch(function(){});
      }
      function loadVisuals(){
        loadImageAsset("hero-audio-v3-web.b64",function(image){
          var hero=document.querySelector(".hero");
          if(hero){
            hero.style.backgroundImage="radial-gradient(circle at 80% 22%,rgba(20,128,220,.16),transparent 26%),"+image;
            hero.style.backgroundSize="cover";
            hero.style.backgroundPosition="center center";
          }
        });
        var courseImages=["course-tecnico-operador.b64","course-alinhamento.b64","course-mixagem.b64","course-dinamicos.b64"];
        document.querySelectorAll(".course-art").forEach(function(card,index){
          var file=courseImages[index];
          if(!file)return;
          loadImageAsset(file,function(image){
            card.style.backgroundImage="linear-gradient(0deg,rgba(3,12,23,.58),rgba(3,12,23,.04) 68%),"+image;
            card.style.backgroundSize="cover";
            card.style.backgroundPosition="center";
          });
        });
      }
      function loadBrandAsset(){
        fetch("logo-centep-oficial.b64").then(function(response){
          if(!response.ok)throw new Error("asset");
          return response.text();
        }).then(function(base64){
          document.querySelectorAll("[data-centep-logo]").forEach(function(img){
            img.src="data:image/jpeg;base64,"+base64.trim();
            img.classList.add("ready");
            var link=img.closest(".brand");
            if(link)link.classList.add("logo-ready");
          });
        }).catch(function(){});
      }
      function bindLogin(){
        var roleButtons=document.querySelectorAll("[data-role]");
        roleButtons.forEach(function(btn){btn.addEventListener("click",function(){selectedRole=btn.getAttribute("data-role");render()})});
        var role=roles[selectedRole],email=document.getElementById("email"),password=document.getElementById("password");
        email.value=role.email;password.value=role.senha;
        document.getElementById("demo-note").innerHTML="<b>Acesso demonstrativo:</b><br>"+role.email+" • "+role.senha;
        document.getElementById("login-form").addEventListener("submit",function(event){event.preventDefault();var valid=email.value.trim().toLowerCase()===role.email.toLowerCase()&&password.value===role.senha;if(!valid){document.getElementById("login-error").textContent="E-mail ou senha inválidos para o perfil selecionado.";return}localStorage.setItem("centepSession",JSON.stringify({role:selectedRole,email:role.email}));go(role.route)})
      }
      function render(){
        var current=route();
        if(current==="home-cursos"||current==="home-lab"||current==="home-sobre"){app.innerHTML=home();loadVisuals();loadBrandAsset();setTimeout(function(){var el=document.getElementById(current);if(el)el.scrollIntoView()},0);return}
        if(current==="login"){app.innerHTML=login();loadBrandAsset();bindLogin();return}
        if(current==="portal-aluno"){app.innerHTML=shell("aluno");loadBrandAsset();return}
        if(current==="portal-professor"){app.innerHTML=shell("professor");loadBrandAsset();return}
        if(current==="admin"){app.innerHTML=shell("admin");loadBrandAsset();return}
        app.innerHTML=home();loadVisuals();loadBrandAsset()
      }
      window.addEventListener("hashchange",render);render();
    })();
  </script>
</body>
</html>
